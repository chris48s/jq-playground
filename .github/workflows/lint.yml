name: Lint
on: [push, pull_request]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node JS 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install NPM 11
        run: npm install -g npm@11
      - name: Install Packages
        run: npm ci

      - name: Prettier
        run: npm run prettier:check
      - name: ESLint
        run: npm run lint
